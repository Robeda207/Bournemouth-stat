<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bournemouth Stats</title>
<style>
  :root { --bg:#f6f7fb; --card:#fff; --text:#18202a; --muted:#667085; --line:#e6e8ef; --accent:#b3121d; }
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
  header{position:sticky;top:0;background:var(--card);padding:14px 16px;border-bottom:1px solid var(--line);z-index:10}
  h1{margin:0;font-size:22px} .sub{margin-top:4px;color:var(--muted);font-size:13px}
  .wrap{max-width:860px;margin:0 auto;padding:16px 16px 90px}
  .tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:1px solid var(--line)}
  .tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;color:var(--muted);background:none;border:none}
  .tab.active{color:var(--accent);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .row{display:flex;gap:12px;align-items:center;justify-content:space-between}.small{font-size:12px;color:var(--muted)}
  .player{padding:12px 0;border-bottom:1px solid var(--line)} .player:last-child{border-bottom:none}
  .badge{background:#f1f3f8;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px;color:#344054}
  input, select {width:100%;padding:12px 10px;border-radius:12px;border:1px solid #d0d5dd;background:white;font:inherit}
  label{display:block;font-size:13px;margin:10px 0 6px;color:#344054}
  button.primary{background:var(--accent);color:white;border:none;border-radius:12px;padding:12px 14px;font-weight:600;font:inherit}
  button.secondary{background:white;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hidden{display:none}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .kpi .n{font-weight:700;font-size:20px}.kpi .l{font-size:12px;color:var(--muted)}
  .listBtn{background:none;border:none;padding:0;text-align:left;width:100%;font:inherit;color:inherit}
  .matchLine{font-size:14px;padding:10px 0;border-bottom:1px solid var(--line)} .matchLine:last-child{border-bottom:none}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>Bournemouth Stats</h1>
  <div class="sub">Offline iPhone-ready tracker for appearances and goals</div>
</header>
<div class="wrap">
  <section id="screen-home"></section>
  <section id="screen-add" class="hidden"></section>
  <section id="screen-players" class="hidden"></section>
</div>
<nav class="tabs">
  <button class="tab active" data-screen="home">Leaderboard</button>
  <button class="tab" data-screen="add">Add Match</button>
  <button class="tab" data-screen="players">Players</button>
</nav>
<script>
const defaultPlayers = [
  {no:1,name:'Djordje Petrović',pos:'GK'},
  {no:3,name:'Adrien Truffert',pos:'DF'},
  {no:4,name:'Lewis Cook',pos:'MF'},
  {no:5,name:'Marcos Senesi',pos:'DF'},
  {no:6,name:'Julio Soler',pos:'DF'},
  {no:7,name:'David Brooks',pos:'MF'},
  {no:8,name:'Alex Scott',pos:'MF'},
  {no:9,name:'Evanilson',pos:'FW'},
  {no:10,name:'Ryan Christie',pos:'MF'},
  {no:11,name:'Ben Doak',pos:'FW'},
  {no:12,name:'Tyler Adams',pos:'MF'},
  {no:15,name:'Adam Smith',pos:'DF'},
  {no:16,name:'Marcus Tavernier',pos:'MF'},
  {no:17,name:'Fraser Forster',pos:'GK'},
  {no:18,name:'Bafodé Diakité',pos:'DF'},
  {no:19,name:'Justin Kluivert',pos:'FW'},
  {no:20,name:'Álex Jiménez',pos:'DF'},
  {no:21,name:'Amine Adli',pos:'FW'},
  {no:22,name:'Eli Junior Kroupi',pos:'FW'},
  {no:23,name:'James Hill',pos:'DF'},
  {no:26,name:'Enes Ünal',pos:'FW'},
  {no:27,name:'Alex Tóth',pos:'MF'},
  {no:28,name:'Jalil Conteh',pos:'DF'},
  {no:29,name:'Christos Mandas',pos:'GK'},
  {no:35,name:'Owen Bevan',pos:'DF'},
  {no:37,name:'Rayan',pos:'FW'},
  {no:44,name:'Veljko Milosavljević',pos:'DF'},
  {no:45,name:'Matai Akinmboni',pos:'DF'},
  {no:46,name:'Callan McKenna',pos:'GK'},
  {no:48,name:'Kai Crampton',pos:'GK'}
];

const state = JSON.parse(localStorage.getItem('bournemouthStatsState') || 'null') || {
  players: defaultPlayers,
  matches: []
};
let selectedPlayer = null;

function save(){ localStorage.setItem('bournemouthStatsState', JSON.stringify(state)); }
function esc(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function totalsFor(name){
  const entries = state.matches.flatMap(m => m.entries.filter(e => e.played && e.player===name).map(e => ({...e, date:m.date, opponent:m.opponent})));
  return { apps: entries.length, goals: entries.reduce((a,b)=>a+(Number(b.goals)||0),0), entries };
}
function leaderboard(){
  return state.players.map(p => ({...p, ...totalsFor(p.name)}))
    .sort((a,b)=> b.goals-a.goals || b.apps-a.apps || a.no-b.no);
}
function fmtDate(d){ if(!d) return ''; try { return new Date(d+'T00:00:00').toLocaleDateString(); } catch { return d; } }

function renderHome(){
  const lb = leaderboard();
  const totalMatches = state.matches.length;
  const totalApps = lb.reduce((a,b)=>a+b.apps,0);
  const totalGoals = lb.reduce((a,b)=>a+b.goals,0);
  document.getElementById('screen-home').innerHTML = `
    <div class="kpis" style="margin-bottom:12px">
      <div class="kpi"><div class="n">${totalMatches}</div><div class="l">Matches</div></div>
      <div class="kpi"><div class="n">${totalApps}</div><div class="l">Appearances</div></div>
      <div class="kpi"><div class="n">${totalGoals}</div><div class="l">Goals</div></div>
    </div>
    <div class="card">
      <div class="row"><strong>Leaderboard</strong><span class="small">Goals, then appearances</span></div>
      ${lb.map((p,i)=>`
        <div class="player">
          <button class="listBtn" onclick="openPlayer('${esc(p.name)}')">
            <div class="row"><div><strong>${i+1}. #${p.no} ${esc(p.name)}</strong><div class="small">${p.pos}</div></div><span class="badge">${p.goals} G</span></div>
            <div class="row" style="margin-top:6px"><span class="small">Appearances: ${p.apps}</span><span class="small">Goals: ${p.goals}</span></div>
          </button>
        </div>`).join('')}
    </div>
    <div class="card">
      <strong>Recent matches</strong>
      ${state.matches.length ? state.matches.slice().reverse().slice(0,8).map(m=>`<div class="matchLine"><strong>${esc(m.opponent)}</strong><br><span class="small">${fmtDate(m.date)} · ${m.entries.filter(e=>e.played).length} players logged · ${m.entries.reduce((a,b)=>a+(Number(b.goals)||0),0)} goals logged</span></div>`).join('') : '<div class="small" style="margin-top:8px">No matches yet. Use Add Match to log one.</div>'}
    </div>`;
}

function renderAdd(){
  document.getElementById('screen-add').innerHTML = `
    <div class="card">
      <strong>Add match</strong>
      <label>Date</label><input id="match-date" type="date" />
      <label>Opponent</label><input id="match-opp" type="text" placeholder="e.g. Arsenal" />
      <div class="toolbar">
        <button class="secondary" onclick="selectAllPlayed(true)">Select all</button>
        <button class="secondary" onclick="selectAllPlayed(false)">Clear all</button>
      </div>
    </div>
    <div class="card">
      <strong>Players</strong>
      <div class="small" style="margin-top:4px">Tick players who appeared, then enter goals.</div>
      ${state.players.map((p,idx)=>`
        <div class="player row">
          <div style="flex:1">
            <strong>#${p.no} ${esc(p.name)}</strong>
            <div class="small">${p.pos}</div>
          </div>
          <label style="margin:0;display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="played-${idx}" style="width:18px;height:18px" /> Played</label>
          <input id="goals-${idx}" type="number" min="0" value="0" style="width:72px" />
        </div>`).join('')}
      <div style="margin-top:12px"><button class="primary" onclick="saveMatch()">Save match</button></div>
    </div>
    <div class="card">
      <strong>Backup</strong>
      <div class="toolbar">
        <button class="secondary" onclick="exportData()">Export JSON</button>
        <button class="secondary" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)" />
      </div>
    </div>`;
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('match-date').value = today;
}

function renderPlayers(){
  if(selectedPlayer){
    const p = state.players.find(x=>x.name===selectedPlayer);
    const t = totalsFor(selectedPlayer);
    document.getElementById('screen-players').innerHTML = `
      <div class="card">
        <button class="secondary" onclick="selectedPlayer=null;renderPlayers()">Back</button>
        <h2 style="margin:12px 0 4px">#${p.no} ${esc(p.name)}</h2>
        <div class="small">${p.pos}</div>
        <div class="kpis" style="margin-top:12px">
          <div class="kpi"><div class="n">${t.apps}</div><div class="l">Appearances</div></div>
          <div class="kpi"><div class="n">${t.goals}</div><div class="l">Goals</div></div>
          <div class="kpi"><div class="n">${t.apps ? (t.goals/t.apps).toFixed(2) : '0.00'}</div><div class="l">Goals/App</div></div>
        </div>
      </div>
      <div class="card">
        <strong>Match log</strong>
        ${t.entries.length ? t.entries.slice().reverse().map(e=>`<div class="matchLine"><strong>${esc(e.opponent)}</strong><br><span class="small">${fmtDate(e.date)} · Goals: ${Number(e.goals)||0}</span></div>`).join('') : '<div class="small" style="margin-top:8px">No appearances logged yet.</div>'}
      </div>`;
    return;
  }
  document.getElementById('screen-players').innerHTML = `
    <div class="card">
      <strong>Players</strong>
      <div class="small" style="margin-top:4px">Tap a player for their match-by-match record.</div>
      ${leaderboard().sort((a,b)=>a.no-b.no).map(p=>`
        <div class="player">
          <button class="listBtn" onclick="openPlayer('${esc(p.name)}')">
            <div class="row"><div><strong>#${p.no} ${esc(p.name)}</strong><div class="small">${p.pos}</div></div><span class="badge">${p.apps} app · ${p.goals} g</span></div>
          </button>
        </div>`).join('')}
    </div>`;
}

function saveMatch(){
  const date = document.getElementById('match-date').value;
  const opponent = document.getElementById('match-opp').value.trim();
  if(!date || !opponent){ alert('Please enter a date and opponent.'); return; }
  const entries = state.players.map((p,idx)=>({ player:p.name, played: document.getElementById(`played-${idx}`).checked, goals: Number(document.getElementById(`goals-${idx}`).value||0) }));
  if(!entries.some(e=>e.played)){ alert('Select at least one player who appeared.'); return; }
  state.matches.push({ id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()), date, opponent, entries });
  save(); renderAll(); alert('Match saved.'); switchScreen('home');
}
function selectAllPlayed(val){ state.players.forEach((_,idx)=>{ const el=document.getElementById(`played-${idx}`); if(el) el.checked=val; }); }
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bournemouth-stats-backup.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importData(evt){
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader(); reader.onload = () => {
    try { const obj = JSON.parse(reader.result); if(!obj.players || !obj.matches) throw new Error(); localStorage.setItem('bournemouthStatsState', JSON.stringify(obj)); location.reload(); }
    catch { alert('That file could not be imported.'); }
  }; reader.readAsText(file);
}
function openPlayer(name){ selectedPlayer = name; switchScreen('players'); }
function switchScreen(name){
  ['home','add','players'].forEach(id=>{
    document.getElementById('screen-'+id).classList.toggle('hidden', id!==name);
    document.querySelector(`.tab[data-screen="${id}"]`).classList.toggle('active', id===name);
  });
  if(name==='add') renderAdd();
  if(name==='players') renderPlayers();
  if(name==='home') renderHome();
}
function renderAll(){ renderHome(); renderAdd(); renderPlayers(); }

document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', ()=> switchScreen(btn.dataset.screen)));
renderAll();
</script>
</body>
</html>
