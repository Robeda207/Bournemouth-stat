<script>
const players = [
"Solanke","Semenyo","Kluivert","Tavernier","Ouattara",
"Cook","Christie","Billing","Adams","Scott",
"Kerkez","Smith","Zabarnyi","Senesi","Aarons",
"Kelly","Mepham","Hill","Brooks","Sinisterra",
"Neto","Travers","Radu"
];

let matches = JSON.parse(localStorage.getItem("matches")) || [];
let view = "home";
let selectedSeason = null;

function getSeasons(){
  let set = new Set();
  matches.forEach(m => {
    if(m.season) set.add(m.season);
  });
  return Array.from(set);
}

function calcStats(season){
  let stats = {};
  players.forEach(p => stats[p] = {apps:0, starts:0, subs:0, goals:0});

  matches.forEach(m=>{
    if(m.season !== season) return;

    m.starting.forEach(p=>{
      stats[p.name].apps++;
      stats[p.name].starts++;
      stats[p.name].goals += p.goals;
    });

    m.subs.forEach(p=>{
      stats[p.name].apps++;
      stats[p.name].subs++;
    });
  });

  return stats;
}

function render(){
  let html = "";

  if(view === "home"){
    html += `
      <div class="card" onclick="view='seasons';render()">
        <h3>Player Stats</h3>
        <p>View player stats by season</p>
      </div>

      <div class="card" onclick="view='add';render()">
        <h3>Add Match</h3>
        <p>Enter a new match</p>
      </div>
    `;
  }

  if(view === "seasons"){
    html += `<h3>Select Season</h3>`;

    getSeasons().forEach(season=>{
      html += `
        <div class="card" onclick="selectedSeason='${season}';view='playerStats';render()">
          ${season}
        </div>
      `;
    });

    html += `<button onclick="view='home';render()">Back</button>`;
  }

  if(view === "playerStats"){
    let stats = calcStats(selectedSeason);

    html += `<h3>Player Stats — ${selectedSeason}</h3>`;

    let sorted = Object.keys(stats).sort((a,b)=>stats[b].goals - stats[a].goals);

    sorted.forEach(p=>{
      let s = stats[p];
      html += `
        <div class="card">
          <b>${p}</b><br>
          Apps: ${s.apps} | Starts: ${s.starts} | Subs: ${s.subs} | Goals: ${s.goals}
        </div>
      `;
    });

    html += `<button onclick="view='seasons';render()">Back to Seasons</button>`;
  }

  if(view === "add"){
    html += `
      <div class="card">
        Season:<input id="season" placeholder="2025/26">

        Opponent:<input id="opp">
        Date:<input id="date" type="date">

        Competition:
        <select id="comp">
          <option>Premier League</option>
          <option>FA Cup</option>
          <option>League Cup</option>
          <option>Other</option>
        </select>

        <button onclick="startMatch()">Start Match Entry</button>
      </div>

      <button onclick="view='home';render()">Back</button>
    `;
  }

  document.getElementById("app").innerHTML = html;
}
</script>
