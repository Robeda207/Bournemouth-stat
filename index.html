<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bournemouth Stats</title>
<style>
body { font-family: Arial; margin:0; background:#f5f6fa; }
header { padding:15px; background:#111; color:white; text-align:center; }
.container { padding:10px; }
.player { display:flex; justify-content:space-between; padding:10px; background:white; margin-bottom:6px; border-radius:8px; }
button { padding:12px; width:100%; margin-top:10px; background:#d71920; color:white; border:none; border-radius:8px; font-size:16px; }
input { width:50px; }
</style>
</head>

<body>

<header>
<h2>Bournemouth Stats</h2>
</header>

<div class="container" id="app"></div>

<script>
const players = [
"Solanke","Semenyo","Kluivert","Tavernier","Ouattara",
"Cook","Christie","Billing","Adams","Scott",
"Kerkez","Smith","Zabarnyi","Senesi","Aarons",
"Kelly","Mepham","Hill","Brooks","Sinisterra",
"Neto","Travers","Radu"
];

let stats = JSON.parse(localStorage.getItem("stats")) || {};

function render() {
let html = "<h3>Add Match</h3>";

players.forEach(p => {
html += `
<div class="player">
<label>
<input type="checkbox" id="${p}">
${p}
</label>
Goals: <input type="number" id="g_${p}" value="0">
</div>`;
});

html += `<button onclick="saveMatch()">Save Match</button>`;
html += `<h3>Leaderboard</h3>`;

players.forEach(p => {
let s = stats[p] || {apps:0, goals:0};
html += `<div class="player">
${p}
<span>${s.apps} apps / ${s.goals} goals</span>
</div>`;
});

document.getElementById("app").innerHTML = html;
}

function saveMatch() {
players.forEach(p => {
let played = document.getElementById(p).checked;
let goals = parseInt(document.getElementById("g_"+p).value) || 0;

if (played) {
if (!stats[p]) stats[p] = {apps:0, goals:0};
stats[p].apps += 1;
stats[p].goals += goals;
}
});

localStorage.setItem("stats", JSON.stringify(stats));
render();
}

render();
</script>

</body>
</html>
