<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bournemouth Stats</title>
<style>
body{font-family:Arial;margin:0;background:#0b0b0b;color:white}
header{padding:16px;background:#d71920;text-align:center}
.container{padding:12px}
.card{background:#1a1a1a;padding:14px;margin-bottom:10px;border-radius:10px}
button{padding:12px;width:100%;margin-top:10px;background:#d71920;color:white;border:0;border-radius:8px;font-size:16px}
input,select{width:100%;padding:8px;margin:6px 0}
.row{display:flex;justify-content:space-between;gap:8px;margin:6px 0}
.small{width:60px}
</style>
</head>
<body>
<header><h2>Bournemouth Stats</h2></header>
<div class="container" id="app"></div>

<script>
const players=["Solanke","Semenyo","Kluivert","Tavernier","Ouattara","Cook","Christie","Billing","Adams","Scott","Kerkez","Smith","Zabarnyi","Senesi","Aarons","Kelly","Mepham","Hill","Brooks","Sinisterra","Neto","Travers","Radu"];
let matches=JSON.parse(localStorage.getItem("matches")||"[]");
let view="home";
let selectedSeason="";

function seasons(){
  return [...new Set(matches.map(m=>m.season).filter(Boolean))];
}

function statsFor(season){
  let s={};
  players.forEach(p=>s[p]={apps:0,starts:0,subs:0,goals:0});
  matches.filter(m=>m.season===season).forEach(m=>{
    m.starting.forEach(p=>{s[p.name].apps++;s[p.name].starts++;s[p.name].goals+=p.goals});
    m.subs.forEach(p=>{s[p.name].apps++;s[p.name].subs++});
  });
  return s;
}

function render(){
let html="";

if(view==="home"){
html+=`
<div class="card" onclick="view='seasonList';render()"><h3>Player Stats</h3><p>View stats by season</p></div>
<div class="card" onclick="view='add';render()"><h3>Add Match</h3><p>Enter match details</p></div>
`;
}

if(view==="seasonList"){
html+="<h3>Select Season</h3>";
seasons().forEach(season=>{
html+=`<div class="card" onclick="selectedSeason='${season}';view='stats';render()">${season}</div>`;
});
html+=`<button onclick="view='home';render()">Back</button>`;
}

if(view==="stats"){
let s=statsFor(selectedSeason);
html+=`<h3>Player Stats — ${selectedSeason}</h3>`;
Object.keys(s).sort((a,b)=>s[b].goals-s[a].goals).forEach(p=>{
html+=`<div class="card"><b>${p}</b><br>Apps: ${s[p].apps} | Starts: ${s[p].starts} | Subs: ${s[p].subs} | Goals: ${s[p].goals}</div>`;
});
html+=`<button onclick="view='seasonList';render()">Back</button>`;
}

if(view==="add"){
html+=`
<div class="card">
Season:<input id="season" placeholder="2025/26">
Opponent:<input id="opp">
Date:<input id="date" type="date">
Competition:
<select id="comp">
<option>Premier League</option>
<option>FA Cup</option>
<option>League Cup</option>
<option>Other</option>
</select>
<button onclick="lineup()">Start Match Entry</button>
</div>
<button onclick="view='home';render()">Back</button>`;
}

document.getElementById("app").innerHTML=html;
}

function lineup(){
let season=document.getElementById("season").value;
let opp=document.getElementById("opp").value;
let date=document.getElementById("date").value;
let comp=document.getElementById("comp").value;
let html=`<h3>${season} | ${date} vs ${opp}</h3><h4>Starting XI</h4>`;
players.forEach(p=>{
html+=`<div class="row"><label><input type="checkbox" onchange="limit('s_',11,this)" id="s_${p}"> ${p}</label><input class="small" type="number" id="g_${p}" value="0"></div>`;
});
html+="<h4>Subs</h4>";
players.forEach(p=>{
html+=`<div class="row"><label><input type="checkbox" onchange="limit('sub_',5,this)" id="sub_${p}"> ${p}</label></div>`;
});
html+=`<button onclick="save('${season}','${opp}','${date}','${comp}')">Save Match</button>`;
document.getElementById("app").innerHTML=html;
}

function limit(prefix,max,box){
if(document.querySelectorAll('[id^="'+prefix+'"]:checked').length>max){
box.checked=false;
alert("Maximum "+max);
}
}

function save(season,opp,date,comp){
let match={season,opp,date,comp,starting:[],subs:[]};
players.forEach(p=>{
let starter=document.getElementById("s_"+p).checked;
let sub=document.getElementById("sub_"+p).checked;
if(starter) match.starting.push({name:p,goals:parseInt(document.getElementById("g_"+p).value)||0});
if(sub&&!starter) match.subs.push({name:p});
});
matches.push(match);
localStorage.setItem("matches",JSON.stringify(matches));
view="home";
render();
}

render();
</script>
</body>
</html>
