<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bournemouth Stats</title>

<style>
body{font-family:Arial;margin:0;background:#0b0b0b;color:white}
header{padding:16px;background:#d71920;text-align:center}
.container{padding:12px}
.card{background:#1a1a1a;padding:14px;margin-bottom:10px;border-radius:10px}
button{padding:12px;width:100%;margin-top:10px;background:#d71920;color:white;border:0;border-radius:8px;font-size:16px}
select,input,textarea{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:0}
.small-note{font-size:13px;color:#ccc}
</style>
</head>

<body>
<header><h2>Bournemouth Stats</h2></header>
<div class="container" id="app"></div>

<script>
const seasons=[];
for(let y=2025;y>=1986;y++){
  seasons.push(y+"/"+String(y+1).slice(2));
}

const opponents=[
"Arsenal","Aston Villa","Brentford","Brighton","Burnley","Chelsea","Crystal Palace","Everton","Fulham","Leeds United","Leicester City","Liverpool","Manchester City","Manchester United","Newcastle United","Nottingham Forest","Sheffield United","Southampton","Tottenham Hotspur","West Ham United","Wolverhampton Wanderers",
"Blackburn Rovers","Blackpool","Birmingham City","Bolton Wanderers","Bristol City","Cardiff City","Coventry City","Derby County","Huddersfield Town","Hull City","Ipswich Town","Luton Town","Middlesbrough","Millwall","Norwich City","Preston North End","Queens Park Rangers","Reading","Rotherham United","Sheffield Wednesday","Stoke City","Sunderland","Swansea City","Watford","West Bromwich Albion","Wigan Athletic",
"AFC Wimbledon","Accrington Stanley","Barnsley","Bradford City","Burton Albion","Cambridge United","Charlton Athletic","Cheltenham Town","Colchester United","Crewe Alexandra","Doncaster Rovers","Exeter City","Gillingham","Leyton Orient","Lincoln City","MK Dons","Northampton Town","Oxford United","Peterborough United","Plymouth Argyle","Portsmouth","Rochdale","Shrewsbury Town","Stevenage","Swindon Town","Walsall","Wycombe Wanderers"
];

let matches=JSON.parse(localStorage.getItem("matches")||"[]");
let view="home";
let selectedSeason="";

function render(){
let html="";

if(view==="home"){
html+=`
<div class="card" onclick="view='seasonList';render()">
<h3>Player Stats</h3>
<p>View stats by season</p>
</div>

<div class="card" onclick="view='add';render()">
<h3>Add Match</h3>
<p>Enter a match</p>
</div>`;
}

if(view==="seasonList"){
html+="<h3>Select Season</h3>";
let used=[...new Set(matches.map(m=>m.season).filter(Boolean))];

if(used.length===0){
html+=`<div class="card">No matches saved yet.</div>`;
}

used.forEach(season=>{
html+=`<div class="card" onclick="selectedSeason='${season}';view='stats';render()">${season}</div>`;
});

html+=`<button onclick="view='home';render()">Back</button>`;
}

if(view==="stats"){
let stats={};

matches.filter(m=>m.season===selectedSeason).forEach(m=>{
m.starting.forEach(p=>{
if(!stats[p.name]) stats[p.name]={apps:0,starts:0,subs:0,goals:0};
stats[p.name].apps++;
stats[p.name].starts++;
stats[p.name].goals+=p.goals;
});

m.subs.forEach(p=>{
if(!stats[p.name]) stats[p.name]={apps:0,starts:0,subs:0,goals:0};
stats[p.name].apps++;
stats[p.name].subs++;
});
});

html+=`<h3>Player Stats — ${selectedSeason}</h3>`;

Object.keys(stats).sort((a,b)=>stats[b].goals-stats[a].goals).forEach(name=>{
let s=stats[name];
html+=`<div class="card"><b>${name}</b><br>Apps: ${s.apps} | Starts: ${s.starts} | Subs: ${s.subs} | Goals: ${s.goals}</div>`;
});

html+=`<button onclick="view='seasonList';render()">Back</button>`;
}

if(view==="add"){
html+=`
<div class="card">
Season:
<select id="season">
${seasons.map(s=>`<option>${s}</option>`).join("")}
</select>

Opponent:
<select id="opp">
${opponents.map(o=>`<option>${o}</option>`).join("")}
</select>

Date:
<input id="date" type="date">

Competition:
<select id="comp">
<option>Premier League</option>
<option>FA Cup</option>
<option>League Cup</option>
<option>Other</option>
</select>

<button onclick="matchEntry()">Continue</button>
</div>

<button onclick="view='home';render()">Back</button>`;
}

document.getElementById("app").innerHTML=html;
}

function matchEntry(){
let season=document.getElementById("season").value;
let opp=document.getElementById("opp").value;
let date=document.getElementById("date").value;
let comp=document.getElementById("comp").value;

let html=`
<h3>${season} | ${date} vs ${opp}</h3>

<div class="card">
<h3>Starting XI</h3>
<div class="small-note">Enter one player per line. Add goals like: Solanke, 2</div>
<textarea id="startingText" rows="12"></textarea>
</div>

<div class="card">
<h3>Substitutes</h3>
<div class="small-note">Enter up to 5 substitutes, one per line.</div>
<textarea id="subsText" rows="6"></textarea>
</div>

<button onclick="saveMatch('${season}','${opp}','${date}','${comp}')">Save Match</button>
<button onclick="view='add';render()">Back</button>
`;

document.getElementById("app").innerHTML=html;
}

function saveMatch(season,opp,date,comp){
let startingLines=document.getElementById("startingText").value.split("\\n").map(x=>x.trim()).filter(Boolean);
let subLines=document.getElementById("subsText").value.split("\\n").map(x=>x.trim()).filter(Boolean);

if(startingLines.length>11){
alert("Starting XI can only have 11 players.");
return;
}

if(subLines.length>5){
alert("Substitutes can only have up to 5 players.");
return;
}

let starting=startingLines.map(line=>{
let parts=line.split(",");
let name=parts[0].trim();
let goals=parseInt(parts[1])||0;
return {name,goals};
});

let subs=subLines.map(name=>({name}));

matches.push({season,opp,date,comp,starting,subs});
localStorage.setItem("matches",JSON.stringify(matches));

view="home";
render();
}

render();
</script>
</body>
</html>
